<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>發文字號檢核系統</title>
    <!-- 引入 Font Awesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 基礎樣式設定 */
        :root {
            --primary-blue: #007bff;
            --bg-color: #f0f2f5;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
        }

        /* 網頁主容器：確保內容置中 */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 內嵌容器樣式 */
        .embed-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* 確保圓角效果 */
            position: relative;
        }

        /* 頂部裝飾條（可選） */
        .top-bar {
            height: 6px;
            background: linear-gradient(to right, #007bff, #00c6ff);
            width: 100%;
        }

        /* iframe 設定 */
        iframe {
            width: 100%;
            height: 600px; /* 根據你查詢系統的高度調整 */
            border: none;
            display: block;
        }

        /* 頁尾版權資訊 */
        .footer {
            margin-top: 25px;
            font-size: 14px;
            color: #888;
            text-align: center;
        }

        .footer a {
            color: var(--primary-blue);
            text-decoration: none;
        }

        /* 讀取中的緩衝動畫（防止載入 iframe 時空白） */
        .loader-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            color: #ddd;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <!-- 模擬手機 App 質感的容器 -->
        <div class="embed-container">
            <div class="top-bar"></div>
            
            <!-- 載入動畫提示 -->
            <div class="loader-wrapper">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
            </div>

            <!-- 內嵌你的 GAS 網址 -->
            <!-- 記得確認 Code.gs 已設定 setXFrameOptionsMode(HtmlService.XFrameOptionsMode.ALLOWALL) -->
            <iframe 
                src="https://script.google.com/macros/s/AKfycbxc0zaxITVDXudgfwhNYU58VU7RAZmHyap5zxHUdNdP03tD4FV7ElP8gTq_jdb5IbaK/exec" 
                title="發文字號檢核系統"
                loading="lazy">
            </iframe>
        </div>

        <!-- 頁尾 -->
        <div class="footer">
            <p>© 2026 發文字號檢核系統</p>
            <p>由 <a href="#">科技貓開發/行銷團隊</a> 技術支援</p>
        </div>
    </div>

</body>
</html>
