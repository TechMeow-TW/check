      margin: 0;
      padding: 0;

    .container {
      background-color: #ffffff;

      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);

    }

      border-radius: 12px;
      display: inline-block;

      border: 1px solid #e2e8f0;

    .qr-box img {

      font-family: monospace;
      font-size: 15px;
      color: #0f172a;
      font-weight: bold;
      letter-spacing: 1px;
      margin: 8px 0;
      display: inline-block;
    }
    .btn {

      background-color: #3b82f6;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      transition: background-color 0.2s;
      margin-bottom: 12px;
    }
    .btn:hover {
      background-color: #2563eb;
    }
    .footer {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 20px;
